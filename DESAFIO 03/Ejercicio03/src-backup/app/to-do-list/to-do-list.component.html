<div class="container mt-5">
  <h2 class="text-center mb-4">Lista de Tareas</h2>

  <div class="card p-3 mb-4">
    <div class="row g-3">
      <div class="col-md-6">
        <label for="taskName" class="form-label">Tarea</label>
        <input type="text" class="form-control" id="taskName" [(ngModel)]="newTask" placeholder="Nombre de la tarea" #taskInput />
      </div>
      <div class="col-md-4">
        <label for="taskDescription" class="form-label">Descripción</label>
        <input type="text" class="form-control" id="taskDescription" [(ngModel)]="newDescription" placeholder="Descripción de la tarea" />
      </div>
      <div class="col-md-2">
        <label for="taskPriority" class="form-label">Prioridad</label>
        <input type="number" class="form-control" id="taskPriority" [(ngModel)]="newPriority" min="1" max="5" />
      </div>
      <div class="col-12 text-center mt-4">
        <button class="btn btn-primary" (click)="addTask()">Agregar Tarea</button>
      </div>
    </div>
  </div>

  <table class="table table-hover table-striped">
    <thead>
      <tr>
        <th scope="col">Tarea</th>
        <th scope="col">Descripción</th>
        <th scope="col">Prioridad</th>
        <th scope="col" class="text-end">Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let item of paginatedItems" [class.completed]="item.completed">
        <ng-container *ngIf="editingItem?.id !== item.id; else editMode">
          <td>{{ item.task }}</td>
          <td>{{ item.description }}</td>
          <td>{{ item.priority }}</td>
          <td class="text-end">
            <div class="btn-group" role="group">
              <button class="btn btn-sm btn-info me-2" (click)="startEdit(item)">Editar</button>
              <button class="btn btn-sm btn-danger" (click)="deleteItem(item.id)">Borrar</button>
            </div>
          </td>
        </ng-container>

        <ng-template #editMode>
          <td><input type="text" class="form-control" [(ngModel)]="editingItem!.task" /></td>
          <td><textarea class="form-control" [(ngModel)]="editingItem!.description"></textarea></td>
          <td><input type="number" class="form-control" [(ngModel)]="editingItem!.priority" min="1" max="5" /></td>
          <td class="text-end">
            <div class="btn-group" role="group">
              <button class="btn btn-sm btn-success" (click)="saveEdit()">Guardar</button>
              <button class="btn btn-sm btn-secondary" (click)="cancelEdit()">Cancelar</button>
            </div>
          </td>
        </ng-template>
      </tr>
    </tbody>
  </table>

  <nav aria-label="Navegación de tareas">
    <ul class="pagination justify-content-center">
      <li class="page-item" [class.disabled]="currentPage === 1">
        <button class="page-link" (click)="goToPage(currentPage - 1)">Anterior</button>
      </li>
      <li class="page-item" *ngFor="let page of getPageNumbers()" [class.active]="page === currentPage">
        <button class="page-link" (click)="goToPage(page)">{{ page }}</button>
      </li>
      <li class="page-item" [class.disabled]="currentPage === totalPages">
        <button class="page-link" (click)="goToPage(currentPage + 1)">Siguiente</button>
      </li>
    </ul>
  </nav>
</div>
